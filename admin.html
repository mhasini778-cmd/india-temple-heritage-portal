<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🛕 India Temple Heritage & Pilgrimage Portal 🛕</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="temples.html">Temples</a>
        <a href="admin.html">Admin</a>
    </nav>
</header>

<section class="details">

    <h2>Admin Dashboard</h2>

    <form>

        <label>Temple Name</label>
        <input type="text" placeholder="Enter Temple Name">

        <label>State</label>
        <input type="text" placeholder="Enter State">

        <label>City</label>
        <input type="text" placeholder="Enter City">

        <label>Main Deity</label>
        <input type="text" placeholder="Enter Deity Name">

        <label>Temple History</label>
        <textarea rows="5"></textarea>

        <label>Darshan Timings</label>
        <input type="text" placeholder="Example: 5 AM - 9 PM">

        <label>Important Festivals</label>
        <textarea rows="3"></textarea>

        <label>Dress Code</label>
        <textarea rows="3"></textarea>

        <label>Visitor Guidelines</label>
        <textarea rows="4"></textarea>

        <button type="submit">
            Add Temple Information
        </button>

    </form>

</section>

<footer>
    <p>© 2026 India Temple Heritage & Pilgrimage Information Portal</p>
</footer>

</body>
</html>
